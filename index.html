<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Frente al D.S.5503</title>
<style>
body{
font-family: Arial;
background:#91a079;
text-align:center;
margin-top:100px;
}
.container{
background:rgb(136, 6, 6);
padding:30px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input{
padding:10px;
width:80%;
margin:10px;
}
button{
padding:10px 20px;
background:#eba7c3;
color:rgb(240, 241, 235);
border:none;
cursor:pointer;
}
#resultado{
margin-top:20px;
}
</style>
</head>
<body>
<div class="container">
<h2>Consulta tu Certificado</h2>
<p>Ingresa tu CI</p>
<input type="text" id="ci">
<br>
<button onclick="buscar()">Buscar</button>
<div id="resultado"></div>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSSJjexwsV7Qph7wLj_Y3gBEK4LU_Au7C8a_g2L4uV-GdoDDeff-iFYhG9gVzMhvLOJniaZBmGz7Cie/pub?gid=0&single=true&output=csv";
async function buscar(){
let ci = document.getElementById("ci").value.trim();
document.getElementById("resultado").innerHTML = "Buscando...";
try{
let response=await fetch(url);
let data = await response.text();
let filas=data.split(/\r?\n/);
let encontrado = false;
for(let i=1;i<filas.length;i++){
let columnas = filas[i].split(",");
let ciTabla = columnas[0].replace(/"/g,'').trim();
let link = columnas[1];
if(ci === ciTabla){
document.getElementById("resultado").innerHTML =
`<br><a href="${link}" target="_blank">
<button style="padding:12px 20px;background:#28a745;color:white;border:none;border-radius:6px;cursor:pointer">
Descargar Certificado
</button>
</a>`;
encontrado = true;
break;
}
}
if(!encontrado){
document.getElementById("resultado").innerHTML =
"<p style='color:red'>No se encontró certificado</p>";
}
}catch(error){
document.getElementById("resultado").innerHTML =
"Error consultando certificados";
}
}
</script>
